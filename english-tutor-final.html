<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceTutor — AI English Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}



<!-- ══════════ SETUP SCREEN ══════════ -->
<div id="setup">
  <div class="setup-card">
    <div class="setup-logo">🎙️ VoiceTutor</div>
    <p class="setup-sub">Free AI English Tutor — Voice Powered by Groq</p>
    <div class="step-row">
      <div class="step-num">1</div>
      <div class="step-body">
        <strong>Visit console.groq.com</strong>
        <span>Sign up free with email — <b>no credit card ever.</b><br>
        <a href="https://console.groq.com" target="_blank">👉 console.groq.com</a></span>
      </div>
    </div>
    <div class="step-row">
      <div class="step-num">2</div>
      <div class="step-body">
        <strong>Create API Key</strong>
        <span>Dashboard → <b>API Keys</b> → <b>Create API Key</b> → copy it.<br>
        It starts with: <code style="background:#2a2520;padding:1px 6px;border-radius:4px;font-size:0.78em">gsk_...</code></span>
      </div>
    </div>
    <div class="step-row">
      <div class="step-num">3</div>
      <div class="step-body">
        <strong>Paste below — you get 1,000 free messages/day</strong>
        <span>Your key stays in your browser only. Completely private.</span>
      </div>
    </div>
    <input class="key-input" id="keyInput" type="password"
      placeholder="Paste your Groq API Key (gsk_...)"
      onkeydown="if(event.key==='Enter')startApp()">
    <button class="btn-start" onclick="startApp()">Start Learning →</button>
    <div class="free-note">✅ 100% Free · No credit card · No payment · Ever</div>
  </div>
</div>

<!-- ══════════ MAIN APP ══════════ -->
<div id="app" style="display:none;flex:1;overflow:hidden;flex-direction:row">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-top">
      <span class="app-logo">VoiceTutor</span>
      <button class="btn-new" onclick="newConversation()">✦ New Chat</button>
    </div>

    <div class="conv-list" id="convList">
      <!-- filled by JS -->
    </div>

    <div class="sidebar-bottom">
      <div class="mode-section-label">Tutor Mode</div>
      <button class="mode-btn active" onclick="setMode('conversation')" id="mb-conversation"><span class="mode-dot"></span>Free Conversation</button>
      <button class="mode-btn" onclick="setMode('grammar')"      id="mb-grammar"><span class="mode-dot"></span>Grammar Check</button>
      <button class="mode-btn" onclick="setMode('pronunciation')" id="mb-pronunciation"><span class="mode-dot"></span>Pronunciation</button>
      <button class="mode-btn" onclick="setMode('vocabulary')"   id="mb-vocabulary"><span class="mode-dot"></span>Vocabulary Builder</button>
      <button class="mode-btn" onclick="setMode('ielts')"        id="mb-ielts"><span class="mode-dot"></span>IELTS Practice</button>

      <button class="voice-toggle" onclick="toggleVoicePanel()">⚙ Voice Settings <span id="vpArrow">▾</span></button>
      <div class="voice-panel" id="voicePanel">
        <div class="vc-row">
          <div class="vc-label"><span>Voice</span></div>
          <select class="vc-select" id="voiceSelect"><option>Loading…</option></select>
        </div>
        <div class="vc-row">
          <div class="vc-label"><span>Speed</span><span id="rateVal">1.0×</span></div>
          <input class="vc-range" type="range" id="rateRange" min="0.6" max="1.6" step="0.1" value="1.0"
            oninput="document.getElementById('rateVal').textContent=this.value+'×'">
        </div>
        <div class="vc-row">
          <div class="vc-label"><span>Pitch</span><span id="pitchVal">1.0</span></div>
          <input class="vc-range" type="range" id="pitchRange" min="0.7" max="1.4" step="0.1" value="1.0"
            oninput="document.getElementById('pitchVal').textContent=this.value">
        </div>
      </div>

      <button class="btn-change-key" onclick="changeKey()">⬡ Change API Key</button>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area">
    <div class="chat-header">
      <div class="chat-title" id="chatTitle">New Conversation</div>
      <div class="status-chip">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusTxt">Ready</span>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome">
        <h2>Hello! I'm your English Tutor 👋</h2>
        <p>Choose a mode from the sidebar, then speak or type.<br>
        Click any tutor reply to hear it read aloud.</p>
        <div class="welcome-badge">⚡ Groq AI — 1,000 free messages per day</div>
      </div>
    </div>

    <div class="input-bar">
      <div class="transcript" id="transcript">
        <span id="transcriptText">🎙 Press the mic and speak in English…</span>
        <div class="transcript-dot"></div>
      </div>
      <div class="input-row">
        <button class="ibtn ibtn-mic" id="micBtn" onclick="toggleMic()" title="Voice input">🎤</button>
        <input class="text-in" id="textIn" type="text"
          placeholder="Or type your message…"
          onkeydown="if(event.key==='Enter')sendMessage()">
        <button class="btn-send" onclick="sendMessage()">Send ↗</button>
        <button class="ibtn ibtn-audio" id="audioBtn" onclick="toggleAudio()" disabled title="Play / Stop">🔊</button>
      </div>
    </div>
  </div>
</div>

<!-- Dropdown menu -->
<div class="dropdown" id="dropdown">
  <div class="dd-item" onclick="renameConv()">✎ &nbsp;Rename</div>
  <div class="dd-item danger" onclick="deleteConvConfirm()">✕ &nbsp;Delete</div>
</div>

<!-- Confirm dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h4>Delete Conversation?</h4>
    <p>This conversation will be permanently deleted and cannot be recovered.</p>
    <div class="confirm-btns">
      <button class="cbtn cbtn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="cbtn cbtn-del" onclick="deleteConvDo()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════
     JAVASCRIPT
══════════════════════════════════ -->
<script>
// ─── CONFIG ───────────────────────────────────────────────
const GROQ_API   = 'https://api.groq.com/openai/v1/chat/completions';
const GROQ_MODEL = 'llama-3.3-70b-versatile';

const MODES = {
  conversation: {
    label:'Free Conversation',
    icon:'💬',
    prompt:`You are a warm, encouraging English conversation tutor. Have natural conversations with the student. After each student message, respond naturally and gently note 1-2 grammar or vocabulary improvements if any exist — put these in [Feedback: ...] at the very end. Keep responses 2-4 sentences. Be friendly and supportive.`
  },
  grammar: {
    label:'Grammar Check',
    icon:'📝',
    prompt:`You are an English grammar tutor. Identify grammar mistakes in the student's message, provide the corrected version, briefly explain the rule, and give one example sentence. If grammar is perfect, praise them and share a useful tip.`
  },
  pronunciation: {
    label:'Pronunciation Practice',
    icon:'🎙️',
    prompt:`You are an English pronunciation coach. Help students with pronunciation. Use simple phonetic spelling like "GEN-er-ous" for tricky words. Give practical tips and be encouraging.`
  },
  vocabulary: {
    label:'Vocabulary Builder',
    icon:'📚',
    prompt:`You are an English vocabulary tutor. Pick 1-2 interesting words from the student's message or teach a useful related word. Give: definition, pronunciation tip, example sentence, and a memory trick. Make it fun!`
  },
  ielts: {
    label:'IELTS Practice',
    icon:'🎯',
    prompt:`You are an IELTS Speaking examiner and coach. Ask IELTS Speaking Part 1, 2, or 3 questions. Evaluate responses on Fluency, Vocabulary, Grammar, and Pronunciation. Estimate a band score (1-9) for each. Be constructive.`
  }
};

// ─── STATE ────────────────────────────────────────────────
let apiKey         = localStorage.getItem('vt_groq_key') || '';
let conversations  = JSON.parse(localStorage.getItem('vt_convs') || '[]');
let currentId      = localStorage.getItem('vt_cur') || null;
let currentMode    = 'conversation';
let isListening    = false;
let recognition    = null;
let synth          = window.speechSynthesis;
let voices         = [];
let isSpeaking     = false;
let currentBubble  = null; // currently playing bubble element
let ddTargetId     = null; // conv id for dropdown

// ─── BOOT ─────────────────────────────────────────────────
window.onload = () => {
  loadVoices();
  if (apiKey) bootApp();
};

function bootApp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display   = 'flex';
  renderConvList();
  if (currentId && getConv(currentId)) {
    loadConv(currentId);
  } else {
    newConversation();
  }
}

function startApp() {
  const k = document.getElementById('keyInput').value.trim();
  if (!k.startsWith('gsk_')) { showToast('⚠️ Invalid key — must start with gsk_'); return; }
  apiKey = k;
  localStorage.setItem('vt_groq_key', k);
  bootApp();
}

function changeKey() {
  localStorage.removeItem('vt_groq_key');
  apiKey = '';
  document.getElementById('setup').style.display   = 'flex';
  document.getElementById('app').style.display     = 'none';
  document.getElementById('keyInput').value        = '';
  synth.cancel();
}

// ─── CONVERSATIONS ────────────────────────────────────────
function saveConvs() {
  localStorage.setItem('vt_convs', JSON.stringify(conversations));
}

function getConv(id) {
  return conversations.find(c => c.id === id);
}

function newConversation() {
  const id   = 'c_' + Date.now();
  const conv = {
    id,
    name: 'New Conversation',
    mode: currentMode,
    messages: [],
    createdAt: Date.now()
  };
  conversations.unshift(conv);
  saveConvs();
  currentId = id;
  localStorage.setItem('vt_cur', id);
  renderConvList();
  renderMessages(conv);
  document.getElementById('chatTitle').textContent = conv.name;
  synth.cancel();
}

function loadConv(id) {
  const conv = getConv(id);
  if (!conv) return;
  currentId = id;
  currentMode = conv.mode || 'conversation';
  localStorage.setItem('vt_cur', id);
  // update mode buttons
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mb-' + currentMode)?.classList.add('active');
  renderMessages(conv);
  document.getElementById('chatTitle').textContent = conv.name;
  renderConvList();
}

function renderConvList() {
  const list = document.getElementById('convList');
  if (!conversations.length) {
    list.innerHTML = `<div style="padding:20px 8px;text-align:center;font-size:0.8rem;color:var(--text3)">No conversations yet</div>`;
    return;
  }
  // Group by Today / Yesterday / Older
  const now   = Date.now();
  const day   = 86400000;
  const todayItems    = conversations.filter(c => now - c.createdAt < day);
  const yesterItems   = conversations.filter(c => now - c.createdAt >= day && now - c.createdAt < 2*day);
  const olderItems    = conversations.filter(c => now - c.createdAt >= 2*day);

  let html = '';
  if (todayItems.length)   html += renderGroup('Today',     todayItems);
  if (yesterItems.length)  html += renderGroup('Yesterday', yesterItems);
  if (olderItems.length)   html += renderGroup('Older',     olderItems);
  list.innerHTML = html;

  // attach events
  list.querySelectorAll('.conv-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.conv-dots')) return;
      loadConv(el.dataset.id);
    });
  });
  list.querySelectorAll('.conv-dots').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      openDropdown(el.dataset.id, el);
    });
  });
}

function renderGroup(label, items) {
  let html = `<div class="conv-section-label">${label}</div>`;
  items.forEach(c => {
    const active = c.id === currentId ? 'active' : '';
    html += `<div class="conv-item ${active}" data-id="${c.id}">
      <div class="conv-item-name">${escHTML(c.name)}</div>
      <button class="conv-dots" data-id="${c.id}" title="Options">⋯</button>
    </div>`;
  });
  return html;
}

function renderMessages(conv) {
  const container = document.getElementById('messages');
  if (!conv.messages.length) {
    container.innerHTML = `<div class="welcome">
      <h2>Hello! I'm your English Tutor 👋</h2>
      <p>Choose a mode below, then speak or type.<br>
      Click any tutor reply to hear it read aloud.</p>
      <div class="welcome-badge">⚡ Groq AI — 1,000 free messages per day</div>
    </div>`;
    return;
  }
  container.innerHTML = '';
  // Add welcome back only if messages exist
  conv.messages.forEach(m => appendBubble(m.role, m.text, false));
  container.scrollTop = container.scrollHeight;
}

// ─── SEND MESSAGE ─────────────────────────────────────────
async function sendMessage() {
  const inp  = document.getElementById('textIn');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  resetTranscript();

  const conv = getConv(currentId);
  if (!conv) return;

  // Auto-name the conversation from first user message
  if (conv.messages.length === 0) {
    conv.name = text.length > 38 ? text.slice(0, 38) + '…' : text;
    document.getElementById('chatTitle').textContent = conv.name;
    saveConvs();
    renderConvList();
  }

  conv.messages.push({ role:'user', text, ts: Date.now() });
  saveConvs();
  appendBubble('user', text);

  const tid = appendTyping();
  setStatus('thinking', 'Thinking…');

  try {
    const reply = await callGroq(text, conv);
    removeTyping(tid);
    conv.messages.push({ role:'ai', text: reply, ts: Date.now() });
    saveConvs();
    const bubble = appendBubble('ai', reply);
    setStatus('ready', 'Ready');
    speakText(reply, bubble);
  } catch(err) {
    removeTyping(tid);
    const msg = '⚠️ ' + (err.message || 'Unknown error. Check your API key.');
    appendBubble('ai', msg);
    setStatus('ready', 'Error');
    showToast(err.message);
  }
}

async function callGroq(userMsg, conv) {
  const systemPrompt = MODES[currentMode]?.prompt || MODES.conversation.prompt;

  // Build message history (last 12 messages for context)
  const history = (conv.messages || []).slice(-12).map(m => ({
    role: m.role === 'user' ? 'user' : 'assistant',
    content: m.text
  }));

  const res = await fetch(GROQ_API, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey
    },
    body: JSON.stringify({
      model: GROQ_MODEL,
      max_tokens: 450,
      messages: [
        { role:'system', content: systemPrompt },
        ...history
      ]
    })
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error?.message || 'HTTP ' + res.status);
  }
  const data = await res.json();
  return data.choices?.[0]?.message?.content || 'No response.';
}

// ─── SPEECH SYNTHESIS (TTS) ───────────────────────────────
function loadVoices() {
  voices = synth.getVoices().filter(v => v.lang.startsWith('en'));
  const sel = document.getElementById('voiceSelect');
  if (!sel) return;
  sel.innerHTML = '';
  if (!voices.length) { sel.innerHTML = '<option>No voices found</option>'; return; }
  voices.forEach((v, i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = v.name + ' (' + v.lang + ')';
    if (v.name.includes('Samantha') || v.name.includes('Female') || v.name.includes('Google UK English Female')) o.selected = true;
    sel.appendChild(o);
  });
}
synth.onvoiceschanged = loadVoices;

function speakText(text, bubbleEl) {
  synth.cancel();
  clearPlayingBubble();

  const clean = text.replace(/\[Feedback:.*?\]/gs,'').replace(/[*_#`]/g,'').trim();
  if (!clean) return;

  const u = new SpeechSynthesisUtterance(clean);
  const sel = document.getElementById('voiceSelect');
  if (sel && voices[sel.value]) u.voice = voices[sel.value];
  u.rate  = parseFloat(document.getElementById('rateRange')?.value || 1);
  u.pitch = parseFloat(document.getElementById('pitchRange')?.value || 1);
  u.lang  = 'en-US';

  isSpeaking = true;
  currentBubble = bubbleEl;
  if (bubbleEl) bubbleEl.classList.add('playing');
  setAudioBtn(true);
  setStatus('speaking', 'Speaking…');

  u.onend = u.onerror = () => {
    isSpeaking = false;
    clearPlayingBubble();
    setAudioBtn(false);
    setStatus('ready', 'Ready');
  };
  synth.speak(u);
}

function toggleAudio() {
  if (isSpeaking) {
    synth.cancel();
    isSpeaking = false;
    clearPlayingBubble();
    setAudioBtn(false);
    setStatus('ready', 'Ready');
  }
}

function clearPlayingBubble() {
  if (currentBubble) { currentBubble.classList.remove('playing'); currentBubble = null; }
}

function setAudioBtn(playing) {
  const btn = document.getElementById('audioBtn');
  btn.disabled = false;
  if (playing) {
    btn.classList.add('playing');
    btn.textContent = '⏹';
    btn.title = 'Stop speaking';
  } else {
    btn.classList.remove('playing');
    btn.textContent = '🔊';
    btn.title = 'Replay last response';
    btn.disabled = !getConv(currentId)?.messages?.some(m => m.role === 'ai');
  }
}

// ─── SPEECH RECOGNITION (STT) ─────────────────────────────
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('❌ Use Google Chrome for voice input!'); return null; }
  const r = new SR();
  r.lang = 'en-US'; r.interimResults = true; r.continuous = false;
  r.onresult = e => {
    const t = Array.from(e.results).map(x => x[0].transcript).join('');
    document.getElementById('transcriptText').textContent = t;
    document.getElementById('transcript').classList.add('live');
    if (e.results[e.results.length-1].isFinal)
      document.getElementById('textIn').value = t;
  };
  r.onerror = e => { showToast('Mic: ' + e.error); stopListening(); };
  r.onend   = () => {
    stopListening();
    const v = document.getElementById('textIn').value.trim();
    if (v) sendMessage();
  };
  return r;
}

function toggleMic() {
  if (isListening) { stopListening(); return; }
  synth.cancel(); isSpeaking = false; clearPlayingBubble(); setAudioBtn(false);
  recognition = initRecognition();
  if (!recognition) return;
  isListening = true;
  recognition.start();
  const btn = document.getElementById('micBtn');
  btn.classList.add('on'); btn.textContent = '⏹';
  document.getElementById('transcript').classList.add('live');
  document.getElementById('transcriptText').textContent = 'Listening — speak now…';
  setStatus('listening', 'Listening…');
}

function stopListening() {
  isListening = false;
  if (recognition) { recognition.stop(); recognition = null; }
  const btn = document.getElementById('micBtn');
  btn.classList.remove('on'); btn.textContent = '🎤';
  document.getElementById('transcript').classList.remove('live');
  setStatus('ready', 'Ready');
}

function resetTranscript() {
  document.getElementById('transcriptText').textContent = '🎙 Press the mic and speak in English…';
  document.getElementById('transcript').classList.remove('live');
}

// ─── UI HELPERS ───────────────────────────────────────────
function appendBubble(role, text, scroll = true) {
  const c    = document.getElementById('messages');
  const row  = document.createElement('div');
  row.className = 'msg ' + role;

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'user' ? '👤' : '🧑‍🏫';

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  const bub = document.createElement('div');
  bub.className = 'bubble';

  if (role === 'ai') {
    // parse feedback tag
    const fm    = text.match(/\[Feedback:(.*?)\]/s);
    const main  = text.replace(/\[Feedback:.*?\]/s,'').trim();
    bub.innerHTML = `<span class="bubble-speaker">🔊</span>${escHTML(main)}`;
    if (fm) {
      const tag = document.createElement('div');
      tag.className = 'feedback-tag';
      tag.textContent = '✏️ ' + fm[1].trim();
      bub.appendChild(tag);
    }
    // click any AI bubble to play it
    const plainText = text;
    bub.addEventListener('click', () => speakText(plainText, bub));
  } else {
    bub.textContent = text;
  }

  wrap.appendChild(bub);
  row.appendChild(av);
  row.appendChild(wrap);
  c.appendChild(row);
  if (scroll) c.scrollTop = c.scrollHeight;
  return bub;
}

function appendTyping() {
  const id = 'ty_' + Date.now();
  const c  = document.getElementById('messages');
  const d  = document.createElement('div');
  d.className = 'msg ai'; d.id = id;
  d.innerHTML = `<div class="avatar">🧑‍🏫</div><div class="bubble-wrap"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
  return id;
}
function removeTyping(id) { document.getElementById(id)?.remove(); }

function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mb-' + m)?.classList.add('active');
  const conv = getConv(currentId);
  if (conv) { conv.mode = m; saveConvs(); }
  showToast(`Mode: ${MODES[m].label}`);
}

function setStatus(state, text) {
  document.getElementById('statusTxt').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (state !== 'ready' ? state : '');
}

function toggleVoicePanel() {
  const p = document.getElementById('voicePanel');
  const a = document.getElementById('vpArrow');
  const open = p.classList.toggle('open');
  a.textContent = open ? '▴' : '▾';
}

function escHTML(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── DROPDOWN (three-dot menu) ────────────────────────────
function openDropdown(id, btn) {
  ddTargetId = id;
  const dd  = document.getElementById('dropdown');
  const r   = btn.getBoundingClientRect();
  dd.style.top  = (r.bottom + 4) + 'px';
  dd.style.left = (r.right - 160) + 'px';
  dd.classList.add('show');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.conv-dots') && !e.target.closest('.dropdown')) {
    document.getElementById('dropdown').classList.remove('show');
  }
});

function renameConv() {
  document.getElementById('dropdown').classList.remove('show');
  const conv = getConv(ddTargetId);
  if (!conv) return;
  // find the conv-item and make name editable
  const item = document.querySelector(`.conv-item[data-id="${ddTargetId}"] .conv-item-name`);
  if (!item) return;
  const old = conv.name;
  item.contentEditable = 'true';
  item.focus();
  const range = document.createRange();
  range.selectNodeContents(item);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);

  const finish = () => {
    item.contentEditable = 'false';
    const newName = item.textContent.trim() || old;
    item.textContent = newName;
    conv.name = newName;
    saveConvs();
    if (ddTargetId === currentId)
      document.getElementById('chatTitle').textContent = newName;
  };
  item.addEventListener('blur', finish, { once: true });
  item.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); item.blur(); }
    if (e.key === 'Escape'){ item.textContent = old; item.blur(); }
  }, { once: true });
}

function deleteConvConfirm() {
  document.getElementById('dropdown').classList.remove('show');
  document.getElementById('confirmOverlay').classList.add('show');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('show');
}
function deleteConvDo() {
  closeConfirm();
  conversations = conversations.filter(c => c.id !== ddTargetId);
  saveConvs();
  if (ddTargetId === currentId) {
    if (conversations.length) { loadConv(conversations[0].id); }
    else { newConversation(); }
  }
  renderConvList();
}

// close confirm on overlay click
document.getElementById('confirmOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});
</script>
